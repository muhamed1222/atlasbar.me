<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Limit Bar</title>
    <meta
      name="description"
      content="A quiet macOS menu bar app for keeping an eye on your Codex and Claude usage."
      data-i18n-content="metaDescription"
    />
    <meta property="og:title" content="Limit Bar" data-i18n-content="ogTitle" />
    <meta
      property="og:description"
      content="Track sessions, weekly limits, renewals, and account context without opening dashboards all day."
      data-i18n-content="ogDescription"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='5' fill='%23111111'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="top-controls" data-reveal>
      <div
        class="language-toggle"
        role="group"
        aria-label="Language switcher"
        data-i18n-aria-label="languageSwitcherLabel"
      >
        <button
          class="language-toggle__button"
          type="button"
          data-language-option="en"
          aria-pressed="true"
        >
          EN
        </button>
        <button
          class="language-toggle__button"
          type="button"
          data-language-option="ru"
          aria-pressed="false"
        >
          RU
        </button>
      </div>

      <button
        class="theme-toggle"
        type="button"
        aria-label="Toggle color theme"
        data-i18n-aria-label="themeToggleLabel"
        data-theme-toggle
      >
        <span class="theme-toggle__dot" aria-hidden="true"></span>
      </button>
    </div>

    <main class="page-shell">
      <section class="hero" aria-labelledby="hero-title">
        <header class="hero__header">
          <h1 id="hero-title" class="hero__title">
            <span class="hero__title-primary" data-i18n="titlePrimary">Limit Bar,</span>
            <span class="hero__title-secondary" data-i18n="titleSecondary">menu bar app</span>
          </h1>
        </header>

        <div class="hero__body">
          <p class="hero__copy" data-reveal>
            <span data-i18n="copyLeadStart">A</span>
            <span class="hero__accent" data-i18n="copyAccent">quiet</span>
            <span data-i18n="copyLeadMiddle"
              >macOS menu bar app for keeping an eye on your</span
            >
            <span class="hero__logos" aria-label="Codex and Claude">
              <span class="logo-chip" aria-label="Codex">
                <img
                  class="logo-chip__image"
                  src="./assets/codex-mark.svg"
                  alt=""
                />
              </span>
              <span class="logo-chip" aria-label="Claude">
                <img
                  class="logo-chip__image"
                  src="./assets/claude-mark.svg"
                  alt=""
                />
              </span>
            </span>
            <span data-i18n="copyLeadEnd">usage.</span>
            <span class="hero__copy-inline-muted">
              <span data-i18n="copyMuted"
                >Track sessions, weekly limits, renewals, and account context
                without opening dashboards all day.</span
              >
            </span>
          </p>
        </div>

        <div class="hero__actions" data-reveal>
          <a
            class="button button--primary"
            href="https://github.com/muhamed1222/atlasbar.me/releases"
            target="_blank"
            rel="noreferrer"
            data-i18n="downloadCta"
          >
            Download for macOS
          </a>
          <button
            class="button button--secondary"
            type="button"
            data-feedback-open
            data-i18n="feedbackCta"
          >
            Rate & Review
          </button>
        </div>
      </section>
    </main>

    <div class="feedback-modal" data-feedback-modal hidden>
      <div class="feedback-modal__backdrop" data-feedback-close></div>
      <div
        class="feedback-modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="feedback-title"
      >
        <button
          class="feedback-modal__close"
          type="button"
          aria-label="Close feedback form"
          data-i18n-aria-label="feedbackCloseLabel"
          data-feedback-close
        >
          ×
        </button>

        <form
          class="feedback-form"
          name="limitbar-feedback"
          method="POST"
          action="/"
          data-netlify="true"
          netlify-honeypot="bot-field"
          data-feedback-form
        >
          <input type="hidden" name="form-name" value="limitbar-feedback" />
          <input type="hidden" name="bot-field" />
          <input type="hidden" name="rating" value="0" data-feedback-rating-input />

          <div class="feedback-form__content" data-feedback-form-content>
            <h2 id="feedback-title" class="feedback-form__title" data-i18n="feedbackTitle">
              Leave a quick review
            </h2>

            <div class="feedback-stars" role="radiogroup" aria-label="Rate this app">
              <button class="feedback-star" type="button" data-rating-value="1" aria-label="1 star">
                ★
              </button>
              <button class="feedback-star" type="button" data-rating-value="2" aria-label="2 stars">
                ★
              </button>
              <button class="feedback-star" type="button" data-rating-value="3" aria-label="3 stars">
                ★
              </button>
              <button class="feedback-star" type="button" data-rating-value="4" aria-label="4 stars">
                ★
              </button>
              <button class="feedback-star" type="button" data-rating-value="5" aria-label="5 stars">
                ★
              </button>
            </div>

            <label class="feedback-form__field">
              <span class="feedback-form__label" data-i18n="feedbackReviewLabel">Review</span>
              <textarea
                class="feedback-form__textarea"
                name="review"
                rows="5"
                required
                data-i18n-placeholder="feedbackReviewPlaceholder"
                placeholder="What feels useful, missing, or confusing?"
              ></textarea>
            </label>

            <div class="feedback-form__actions">
              <button class="button button--primary" type="submit" data-i18n="feedbackSubmit">
                Send review
              </button>
            </div>
          </div>

          <div class="feedback-form__success" data-feedback-success hidden>
            <h2 class="feedback-form__title" data-i18n="feedbackSuccessTitle">
              Review received
            </h2>
            <p class="feedback-form__copy" data-i18n="feedbackSuccessCopy">
              Thanks for taking a minute. This helps shape Limit Bar.
            </p>
          </div>
        </form>
      </div>
    </div>

    <script src="./script.js" defer></script>
  </body>
</html>
